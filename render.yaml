services:
  - type: web
    name: taskflow-api
    plan: free
    runtime: docker
    region: oregon
    
    # Build configuration
    dockerfilePath: ./Dockerfile
    
    # Environment variables
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY_HOURS
        value: "24"
      - key: WORKER_CONCURRENCY
        value: "5"
      - key: SCHEDULER_TICK_MS
        value: "5000"
      - key: HEARTBEAT_INTERVAL_S
        value: "30"
      - key: STALE_JOB_THRESHOLD_S
        value: "90"
      - key: LOG_RETENTION_DAYS
        value: "30"
      - key: SERVER_PORT
        value: "8080"
    
    # Health check
    healthCheckPath: /api/docs
    
    # Auto-deploy on GitHub push
    autoDeploy: true

databases:
  - name: taskflow-db
    plan: free
    region: oregon
    databaseName: taskflow
    user: taskflow
    previewPlan: free
